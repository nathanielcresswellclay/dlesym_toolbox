# General params 
experiment_name: SM Anomalies during European Heatwave 2010
toolbox_dir: /pscratch/sd/n/nacc/dlesym_toolbox
output_dir: /pscratch/sd/n/nacc/dlesym_toolbox/analysis_example_outputs
gpus:
  - 0
n_proc: 1
run_inference: False
run_analysis: True
  
# Heat wave analysis config item 
analyses:
  - name: Soil moisture anomalies for 2010 heatwave
    output_subdir: ${output_dir}/2010_heatwave_sm_anomalies_forced
    # parameters used to run forecasts for analysis. experiment_name is 
    # the name of the module in forecast_experiments/
    inference_params:
      experiment_name: euro_heatwave2010_forced_forecast
      # logs and std outputs for inference are saved here
      output_log: ${output_dir}/2010_heatwave_sm_anomalies_forced/inference.log
      # added to python path for inference
      mounted_modules:
        - /pscratch/sd/n/nacc/modulus-uw-dltm
        - /pscratch/sd/n/nacc/NV-dlesm_ncresswell
        - /pscratch/sd/n/nacc/dlesym_toolbox
      models:
        - /pscratch/sd/n/nacc/models/dltm_v2
        # config is temporary for launching subprocesses
      config_cache: ${output_dir}/forced_2010euro_heatwave_sm_experiment_config_temp.yaml
      overwrite_forecasts: False
    analysis_params:
      # name of analysis module 
      analysis_name: euro_heatwave2010_sm_anomalies
      # logs and std outputs for inference are saved here
      output_log: ${output_dir}/2010_heatwave_sm_anomalies_forced/analysis.log
      # added to python path for analysis
      mounted_modules:
        - /pscratch/sd/n/nacc/dlesym_toolbox
        - /pscratch/sd/n/nacc/DLESyM
      # verification data for analysis
      verification_file: /pscratch/sd/n/nacc/training_data/hpx64_1979-2021_3h_dltm-v2.zarr
      # parameters specific to each forecast, IDs are used to name output plots
      forecast_params:
        - file: /pscratch/sd/n/nacc/models/dltm_v2/forecasts/forecast_forced_euro-heatwave2010.nc
          model_id: dltm_v2
      # initialization to be plotted, should work for any length input
      inits:
        - 2010-06-25
        - 2010-07-01
        - 2010-07-07
      # plots go here
      output_directory: ${output_dir}/2010_heatwave_sm_anomalies_forced/
      # another temporary config for launching subprocesses
      config_cache: /pscratch/sd/n/nacc/forced_2010euro_heatwave_sm_analysis_config_temp.yaml